# Receive firmware from dada-tbd CI, commit to the appropriate channel,
# and deploy to GitHub Pages in the same workflow.
# (GITHUB_TOKEN pushes don't trigger other workflows, so Pages deploy
#  must happen here — not in a separate push-triggered workflow.)
name: Receive Firmware

on:
  repository_dispatch:
    types: [firmware-update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.client_payload.artifact_name }}
          path: incoming/
          github-token: ${{ github.event.client_payload.token }}
          repository: dadamachines/ctag-tbd
          run-id: ${{ github.event.client_payload.run_id }}

      - name: Place files in channel directory
        run: |
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          echo "Channel: $CHANNEL  Tag: $TAG"

          P4="$CHANNEL/p4"
          mkdir -p "$P4" "$CHANNEL/pico"

          # ── Device prefix: all CDN binaries self-identify as TBD-16 ──
          DEV="dada-tbd-16"

          # ── Unified image (the only P4 flash binary on CDN) ──
          UNIFIED_SRC=$(find incoming/ -name '*-unified.bin' -print -quit)
          UNIFIED_NAME="${DEV}-${TAG}-unified.bin"
          if [ -n "$UNIFIED_SRC" ]; then
            cp -f "$UNIFIED_SRC" "$P4/$UNIFIED_NAME"
          fi

          # ── SD card image (versioned filenames) ──
          cp -f incoming/build/dada-tbd-sd.zip       "$P4/${DEV}-${TAG}-sd.zip"       2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd-hash.txt  "$P4/${DEV}-${TAG}-sd-hash.txt"  2>/dev/null || true

          # ── tusb_msc — shared utility app, lives in apps/tusb-msc/ ──
          # Only placed once; not duplicated per channel.
          mkdir -p apps/tusb-msc
          if [ ! -f "apps/tusb-msc/${DEV}-tusb-msc.bin" ]; then
            # Migrate from old per-channel locations
            for SRC in "stable/p4/${DEV}-tusb-msc.bin" "stable/p4/tusb_msc.bin"; do
              if [ -f "$SRC" ]; then
                cp -f "$SRC" "apps/tusb-msc/${DEV}-tusb-msc.bin"
                break
              fi
            done
          fi

          # ── Pico firmware ──
          PICO_NAME="${DEV}-${TAG}-pico.uf2"
          if [ -f "$CHANNEL/pico/dada-tbd-pico.uf2" ]; then
            cp -f "$CHANNEL/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/$PICO_NAME"
          elif [ -f "stable/pico/dada-tbd-pico.uf2" ]; then
            cp -f "stable/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/dada-tbd-pico.uf2"
            cp -f "stable/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/$PICO_NAME"
          fi

          # ── Build releases.json ──
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST="$CHANNEL/releases.json"

          NEW_ENTRY=$(cat <<ENTRY
          {
            "tag": "$TAG",
            "timestamp": "$TIMESTAMP",
            "files": {
              "unified": "$P4/$UNIFIED_NAME",
              "sdcard": "$P4/${DEV}-${TAG}-sd.zip",
              "hash": "$P4/${DEV}-${TAG}-sd-hash.txt",
              "pico": "$CHANNEL/pico/$PICO_NAME"
            }
          }
          ENTRY
          )

          if [ -f "$MANIFEST" ]; then
            TMP=$(mktemp)
            echo "$NEW_ENTRY" | jq --arg tag "$TAG" \
              --slurpfile existing "$MANIFEST" \
              '$existing[0] | .latest = $tag | .versions = ([input] + [.versions[] | select(.tag != $tag)])' \
              - > "$TMP" && mv "$TMP" "$MANIFEST"
          else
            echo "$NEW_ENTRY" | jq --arg ch "$CHANNEL" --arg tag "$TAG" \
              '{channel: $ch, latest: $tag, versions: [input]}' \
              - > "$MANIFEST"
          fi

          # ── Clean up legacy files ──
          rm -f "$CHANNEL/latest.json"
          rm -f "$P4/dada-tbd.bin" "$P4/bootloader.bin" "$P4/partition-table.bin"
          rm -f "$P4/ota_data_initial.bin"
          rm -f "$P4/tusb_msc.bin"
          rm -f "$P4/${DEV}-app.bin" "$P4/${DEV}-bootloader.bin"
          rm -f "$P4/${DEV}-partitions.bin" "$P4/${DEV}-otadata.bin"
          rm -f "$P4/${DEV}-tusb-msc.bin"
          rm -f "$P4/${DEV}-sd.zip" "$P4/${DEV}-sd-hash.txt"
          rm -f "$P4/dada-tbd-sd.zip" "$P4/dada-tbd-sd-hash.txt"
          # Remove old version subdirectories (version is now in filename)
          find "$P4" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true

          rm -rf incoming/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update $CHANNEL channel — $TAG"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: receive
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
