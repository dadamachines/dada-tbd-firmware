# Receive firmware from dada-tbd CI, commit to the appropriate channel,
# and deploy to GitHub Pages in the same workflow.
# (GITHUB_TOKEN pushes don't trigger other workflows, so Pages deploy
#  must happen here — not in a separate push-triggered workflow.)
name: Receive Firmware

on:
  repository_dispatch:
    types: [firmware-update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.client_payload.artifact_name }}
          path: incoming/
          github-token: ${{ github.event.client_payload.token }}
          repository: dadamachines/ctag-tbd
          run-id: ${{ github.event.client_payload.run_id }}

      - name: Place files in channel directory
        run: |
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          echo "Channel: $CHANNEL  Tag: $TAG"

          P4="$CHANNEL/p4"
          mkdir -p "$P4" "$P4/$TAG" "$CHANNEL/pico"

          # ── Device prefix: all CDN binaries self-identify as TBD-16 ──
          DEV="dada-tbd-16"

          # ── Latest copies (convenience aliases — overwritten each release) ──
          cp -f incoming/build/dada-tbd.bin                         "$P4/${DEV}-app.bin"            2>/dev/null || true
          cp -f incoming/build/bootloader/bootloader.bin            "$P4/${DEV}-bootloader.bin"     2>/dev/null || true
          cp -f incoming/build/partition_table/partition-table.bin   "$P4/${DEV}-partitions.bin"     2>/dev/null || true
          cp -f incoming/build/ota_data_initial.bin                 "$P4/${DEV}-otadata.bin"        2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd.zip                      "$P4/${DEV}-sd.zip"             2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd-hash.txt                 "$P4/${DEV}-sd-hash.txt"        2>/dev/null || true

          # ── Versioned archive: {channel}/p4/{tag}/ ──
          # Each release keeps its SD zip + hash so older versions remain
          # available for Path B (full SD card deploy).
          cp -f incoming/build/dada-tbd-sd.zip       "$P4/$TAG/${DEV}-sd.zip"       2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd-hash.txt  "$P4/$TAG/${DEV}-sd-hash.txt"  2>/dev/null || true

          # ── Unified image (versioned — accumulates in p4/) ──
          UNIFIED_SRC=$(find incoming/ -name '*-unified.bin' -print -quit)
          UNIFIED_NAME="${DEV}-${TAG}-unified.bin"
          if [ -n "$UNIFIED_SRC" ]; then
            cp -f "$UNIFIED_SRC" "$P4/$UNIFIED_NAME"
          fi

          # ── tusb_msc — seed from stable if not yet in this channel ──
          if [ ! -f "$P4/${DEV}-tusb-msc.bin" ] && [ -f "stable/p4/${DEV}-tusb-msc.bin" ]; then
            cp -f "stable/p4/${DEV}-tusb-msc.bin" "$P4/${DEV}-tusb-msc.bin"
          fi
          # Migrate: accept old name from stable if new name doesn't exist yet
          if [ ! -f "$P4/${DEV}-tusb-msc.bin" ] && [ -f "stable/p4/tusb_msc.bin" ]; then
            cp -f "stable/p4/tusb_msc.bin" "$P4/${DEV}-tusb-msc.bin"
          fi

          # ── Pico firmware ──
          PICO_NAME="${DEV}-${TAG}-pico.uf2"
          if [ -f "$CHANNEL/pico/dada-tbd-pico.uf2" ]; then
            cp -f "$CHANNEL/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/$PICO_NAME"
          elif [ -f "stable/pico/dada-tbd-pico.uf2" ]; then
            cp -f "stable/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/dada-tbd-pico.uf2"
            cp -f "stable/pico/dada-tbd-pico.uf2" "$CHANNEL/pico/$PICO_NAME"
          fi

          # ── Build releases.json (channel catalog with version history) ──
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST="$CHANNEL/releases.json"

          # Per-version entry
          NEW_ENTRY=$(cat <<ENTRY
          {
            "tag": "$TAG",
            "timestamp": "$TIMESTAMP",
            "files": {
              "unified": "$P4/$UNIFIED_NAME",
              "sdcard": "$P4/$TAG/${DEV}-sd.zip",
              "hash": "$P4/$TAG/${DEV}-sd-hash.txt",
              "pico": "$CHANNEL/pico/$PICO_NAME"
            }
          }
          ENTRY
          )

          if [ -f "$MANIFEST" ]; then
            # Prepend new version (remove duplicate tag if re-releasing)
            TMP=$(mktemp)
            echo "$NEW_ENTRY" | jq --arg tag "$TAG" \
              --slurpfile existing "$MANIFEST" \
              '$existing[0] | .latest = $tag | .versions = ([input] + [.versions[] | select(.tag != $tag)])' \
              - > "$TMP" && mv "$TMP" "$MANIFEST"
          else
            # First release for this channel
            echo "$NEW_ENTRY" | jq --arg ch "$CHANNEL" --arg tag "$TAG" --arg dev "$DEV" \
              '{channel: $ch, latest: $tag, shared: {tusb_msc: ($ch + "/p4/" + $dev + "-tusb-msc.bin"), app: ($ch + "/p4/" + $dev + "-app.bin"), bootloader: ($ch + "/p4/" + $dev + "-bootloader.bin"), partitions: ($ch + "/p4/" + $dev + "-partitions.bin"), otadata: ($ch + "/p4/" + $dev + "-otadata.bin")}, versions: [input]}' \
              - > "$MANIFEST"
          fi

          # Clean up old naming artifacts
          rm -f "$CHANNEL/latest.json"
          rm -f "$P4/dada-tbd.bin" "$P4/bootloader.bin" "$P4/partition-table.bin"
          rm -f "$P4/ota_data_initial.bin" "$P4/dada-tbd-sd.zip" "$P4/dada-tbd-sd-hash.txt"
          rm -f "$P4/tusb_msc.bin"

          rm -rf incoming/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update $CHANNEL channel — $TAG"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: receive
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
