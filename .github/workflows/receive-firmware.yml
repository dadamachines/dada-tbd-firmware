# Receive firmware from dada-tbd CI, commit to the appropriate channel,
# and deploy to GitHub Pages in the same workflow.
# (GITHUB_TOKEN pushes don't trigger other workflows, so Pages deploy
#  must happen here — not in a separate push-triggered workflow.)
name: Receive Firmware

on:
  repository_dispatch:
    types: [firmware-update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.client_payload.artifact_name }}
          path: incoming/
          github-token: ${{ github.event.client_payload.token }}
          repository: dadamachines/ctag-tbd
          run-id: ${{ github.event.client_payload.run_id }}

      - name: Place files in channel directory
        run: |
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          echo "Channel: $CHANNEL  Tag: $TAG"

          mkdir -p "$CHANNEL/p4"

          # P4 firmware files
          cp -f incoming/build/dada-tbd.bin          "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/bootloader/bootloader.bin "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/partition_table/partition-table.bin "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/ota_data_initial.bin   "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd.zip        "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd-hash.txt   "$CHANNEL/p4/" 2>/dev/null || true

          # Unified image (versioned name from build)
          find incoming/ -name '*-unified.bin' -exec cp -f {} "$CHANNEL/p4/" \; 2>/dev/null || true

          # tusb_msc.bin — seed from stable if not already present in this channel
          if [ ! -f "$CHANNEL/p4/tusb_msc.bin" ] && [ -f "stable/p4/tusb_msc.bin" ]; then
            cp -f "stable/p4/tusb_msc.bin" "$CHANNEL/p4/tusb_msc.bin"
          fi

          # Write channel manifest (P4 + SD only — Pico fields are patched
          # in separately by the Pico app's publish-cdn job)
          UNIFIED_NAME=$(find incoming/ -name '*-unified.bin' -printf '%f' 2>/dev/null || basename $(find incoming/ -name '*-unified.bin') 2>/dev/null || echo '')
          # Extract MAJOR.MINOR from tag for compatibility range
          # v0.4.1 → 0.4, staging-abc123 → staging, feature-test-foo-abc123 → feature-test-foo
          COMPAT_RANGE=$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+)\..*/\1/' )

          # Preserve existing pico fields if they were set by the Pico CI
          PICO_FILE=""
          PICO_VER=""
          if [ -f "$CHANNEL/latest.json" ]; then
            PICO_FILE=$(jq -r '.files.pico // empty' "$CHANNEL/latest.json" 2>/dev/null || true)
            PICO_VER=$(jq -r '.picoVersion // empty' "$CHANNEL/latest.json" 2>/dev/null || true)
          fi

          # Build manifest — include pico fields only if they already exist
          jq -n \
            --arg tag "$TAG" \
            --arg channel "$CHANNEL" \
            --arg compat "$COMPAT_RANGE" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg unified "$CHANNEL/p4/$UNIFIED_NAME" \
            --arg p4 "$CHANNEL/p4/dada-tbd.bin" \
            --arg boot "$CHANNEL/p4/bootloader.bin" \
            --arg pt "$CHANNEL/p4/partition-table.bin" \
            --arg ota "$CHANNEL/p4/ota_data_initial.bin" \
            --arg sd "$CHANNEL/p4/dada-tbd-sd.zip" \
            --arg hash "$CHANNEL/p4/dada-tbd-sd-hash.txt" \
            --arg tusb "$CHANNEL/p4/tusb_msc.bin" \
            --arg pico "$PICO_FILE" \
            --arg picoVer "$PICO_VER" \
            '{
              tag: $tag, channel: $channel, compatRange: $compat,
              timestamp: $ts,
              files: {
                unified: $unified, p4: $p4, bootloader: $boot,
                partition_table: $pt, ota_data: $ota, sdcard: $sd,
                hash: $hash, tusb_msc: $tusb
              }
            }
            | if $pico != "" then .files.pico = $pico | .picoVersion = $picoVer else . end' \
            > "$CHANNEL/latest.json"

          rm -rf incoming/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update $CHANNEL channel — $TAG"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: receive
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
