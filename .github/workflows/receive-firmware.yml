# Receive firmware from ctag-tbd CI, commit to the appropriate channel,
# and deploy to GitHub Pages in the same workflow.
# (GITHUB_TOKEN pushes don't trigger other workflows, so Pages deploy
#  must happen here — not in a separate push-triggered workflow.)
name: Receive Firmware

on:
  repository_dispatch:
    types: [firmware-update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.client_payload.artifact_name }}
          path: incoming/
          github-token: ${{ github.event.client_payload.token }}
          repository: dadamachines/ctag-tbd
          run-id: ${{ github.event.client_payload.run_id }}

      - name: Place files in channel directory
        run: |
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          echo "Channel: $CHANNEL  Tag: $TAG"

          mkdir -p "$CHANNEL/p4"

          # P4 firmware files
          cp -f incoming/build/ctag-tbd.bin          "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/bootloader/bootloader.bin "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/partition_table/partition-table.bin "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/ota_data_initial.bin   "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/tbd-sd-card.zip        "$CHANNEL/p4/" 2>/dev/null || true
          cp -f incoming/build/tbd-sd-card-hash.txt   "$CHANNEL/p4/" 2>/dev/null || true

          # Unified image (versioned name from build)
          find incoming/ -name '*-unified.bin' -exec cp -f {} "$CHANNEL/p4/" \; 2>/dev/null || true

          # Create versioned pico copy (source file stays for future releases)
          PICO_NAME="dada-tbd-16-${TAG}-pico.uf2"
          if [ -f "$CHANNEL/pico/ctag-tbd-pico.uf2" ]; then
            cp -f "$CHANNEL/pico/ctag-tbd-pico.uf2" "$CHANNEL/pico/$PICO_NAME"
          fi

          # Write channel manifest
          UNIFIED_NAME=$(find incoming/ -name '*-unified.bin' -printf '%f' 2>/dev/null || basename $(find incoming/ -name '*-unified.bin') 2>/dev/null || echo '')
          cat > "$CHANNEL/latest.json" << EOF
          {
            "tag": "$TAG",
            "channel": "$CHANNEL",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": {
              "unified": "$CHANNEL/p4/$UNIFIED_NAME",
              "p4": "$CHANNEL/p4/ctag-tbd.bin",
              "bootloader": "$CHANNEL/p4/bootloader.bin",
              "partition_table": "$CHANNEL/p4/partition-table.bin",
              "ota_data": "$CHANNEL/p4/ota_data_initial.bin",
              "sdcard": "$CHANNEL/p4/tbd-sd-card.zip",
              "hash": "$CHANNEL/p4/tbd-sd-card-hash.txt",
              "tusb_msc": "$CHANNEL/p4/tusb_msc.bin",
              "pico": "$CHANNEL/pico/$PICO_NAME"
            }
          }
          EOF

          rm -rf incoming/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update $CHANNEL channel — $TAG"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: receive
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
