# Receive firmware from dada-tbd CI, commit to the appropriate channel,
# and deploy to GitHub Pages in the same workflow.
# (GITHUB_TOKEN pushes don't trigger other workflows, so Pages deploy
#  must happen here — not in a separate push-triggered workflow.)
name: Receive Firmware

on:
  repository_dispatch:
    types: [firmware-update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.client_payload.artifact_name }}
          path: incoming/
          github-token: ${{ github.event.client_payload.token }}
          repository: dadamachines/ctag-tbd
          run-id: ${{ github.event.client_payload.run_id }}

      - name: Place files in channel directory
        run: |
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          echo "Channel: $CHANNEL  Tag: $TAG"

          P4="$CHANNEL/p4"
          mkdir -p "$P4"

          # ── Device prefix: all CDN binaries self-identify as TBD-16 ──
          DEV="dada-tbd-16"

          # ── Unified image (the only P4 flash binary on CDN) ──
          UNIFIED_SRC=$(find incoming/ -name '*-unified.bin' -print -quit)
          UNIFIED_NAME="${DEV}-${TAG}-unified.bin"
          if [ -n "$UNIFIED_SRC" ]; then
            cp -f "$UNIFIED_SRC" "$P4/$UNIFIED_NAME"
          fi

          # ── SD card image (versioned filenames) ──
          cp -f incoming/build/dada-tbd-sd.zip       "$P4/${DEV}-${TAG}-sd.zip"       2>/dev/null || true
          cp -f incoming/build/dada-tbd-sd-hash.txt  "$P4/${DEV}-${TAG}-sd-hash.txt"  2>/dev/null || true

          # ── tusb_msc — P4 MSC utility, lives in utilities/ (not a Pico app) ──
          # Only placed once; not duplicated per channel.
          mkdir -p "utilities/dada-tbd-16-tusb_msc-p4"
          if [ ! -f "utilities/dada-tbd-16-tusb_msc-p4/${DEV}-tusb-msc.bin" ]; then
            # Migrate from old per-channel locations
            for SRC in "stable/p4/${DEV}-tusb-msc.bin" "stable/p4/tusb_msc.bin"; do
              if [ -f "$SRC" ]; then
                cp -f "$SRC" "utilities/dada-tbd-16-tusb_msc-p4/${DEV}-tusb-msc.bin"
                break
              fi
            done
          fi

          # ── Pico firmware: seed new channels from stable's latest pico ──
          if [ "$CHANNEL" != "stable" ] && [ ! -d "$CHANNEL/pico" ]; then
            # Find the latest versioned pico from stable
            LATEST_PICO=$(ls -1 stable/pico/${DEV}-*-pico.uf2 2>/dev/null | sort -V | tail -1)
            if [ -n "$LATEST_PICO" ]; then
              mkdir -p "$CHANNEL/pico"
              PICO_NAME="${DEV}-${TAG}-pico.uf2"
              cp -f "$LATEST_PICO" "$CHANNEL/pico/$PICO_NAME"
            fi
          fi

          # ── Build releases.json ──
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST="$CHANNEL/releases.json"

          # Find the pico file for this tag (if it exists)
          PICO_PATH=""
          PICO_FILE=$(ls -1 "$CHANNEL/pico/${DEV}-${TAG}-pico.uf2" 2>/dev/null | head -1)
          if [ -n "$PICO_FILE" ]; then
            PICO_PATH="$PICO_FILE"
          fi

          # ── WebUI update package ──
          WEBUI_VERSION="${{ github.event.client_payload.webui_version }}"
          WEBUI_ZIP_SRC=$(find incoming/ -name 'webui-update-v*.zip' -print -quit)
          WEBUI_UPDATE_PATH=""
          if [ -n "$WEBUI_ZIP_SRC" ] && [ -n "$WEBUI_VERSION" ]; then
            mkdir -p webui-updates
            WEBUI_ZIP_NAME="webui-update-v${WEBUI_VERSION}.zip"
            cp -f "$WEBUI_ZIP_SRC" "webui-updates/$WEBUI_ZIP_NAME"
            WEBUI_UPDATE_PATH="webui-updates/$WEBUI_ZIP_NAME"
            WEBUI_SIZE=$(wc -c < "webui-updates/$WEBUI_ZIP_NAME" | tr -d ' ')
            WEBUI_CDN_URL="https://dadamachines.github.io/dada-tbd-firmware/$WEBUI_UPDATE_PATH"

            # Update webui-updates/latest.json — STABLE ONLY
            # latest.json is what the on-device auto-updater checks. If staging
            # or feature-test pushed a newer version here, every stable device
            # would see a spurious (and potentially incompatible) update offer.
            # Non-stable WebUI zips are still published above (cp -f) so the
            # flash page can link to them via releases.json → webuiUpdate.
            if [ "$CHANNEL" = "stable" ]; then
              WEBUI_LATEST="webui-updates/latest.json"
              if [ -f "$WEBUI_LATEST" ]; then
                OLD_VER=$(jq -r '.version // empty' "$WEBUI_LATEST")
                if [ "$OLD_VER" != "$WEBUI_VERSION" ]; then
                  jq --arg ver "$WEBUI_VERSION" \
                     --arg date "$(date -u +%Y-%m-%d)" \
                     --arg desc "Full WebUI update (CI-generated)" \
                     --arg url "$WEBUI_CDN_URL" \
                     --argjson size "$WEBUI_SIZE" \
                     '{version: $ver, date: $date, description: $desc, url: $url, size: $size,
                      versions: ([{version: .version, date: .date, url: .url, description: .description}]
                                + (.versions // []))}' \
                     "$WEBUI_LATEST" > "${WEBUI_LATEST}.tmp" && mv "${WEBUI_LATEST}.tmp" "$WEBUI_LATEST"
                else
                  jq --arg url "$WEBUI_CDN_URL" --argjson size "$WEBUI_SIZE" \
                     '.url = $url | .size = $size' \
                     "$WEBUI_LATEST" > "${WEBUI_LATEST}.tmp" && mv "${WEBUI_LATEST}.tmp" "$WEBUI_LATEST"
                fi
              else
                jq -n --arg ver "$WEBUI_VERSION" --arg date "$(date -u +%Y-%m-%d)" \
                   --arg desc "Full WebUI update (CI-generated)" \
                   --arg url "$WEBUI_CDN_URL" --argjson size "$WEBUI_SIZE" \
                   '{version: $ver, date: $date, description: $desc, url: $url, size: $size}' \
                   > "$WEBUI_LATEST"
              fi
            fi
            echo "WebUI: $WEBUI_ZIP_NAME ($WEBUI_SIZE bytes) → webui-updates/"
          fi

          # ── Build releases.json entry ──
          if [ -n "$WEBUI_VERSION" ]; then
            NEW_ENTRY=$(jq -n \
              --arg tag "$TAG" \
              --arg ts "$TIMESTAMP" \
              --arg unified "$P4/$UNIFIED_NAME" \
              --arg sdcard "$P4/${DEV}-${TAG}-sd.zip" \
              --arg hash "$P4/${DEV}-${TAG}-sd-hash.txt" \
              --arg pico "$PICO_PATH" \
              --arg wver "$WEBUI_VERSION" \
              --arg wupd "$WEBUI_UPDATE_PATH" \
              '{tag: $tag, timestamp: $ts, files: {unified: $unified, sdcard: $sdcard, hash: $hash, pico: $pico}, webuiVersion: $wver, webuiUpdate: $wupd}')
          else
            NEW_ENTRY=$(jq -n \
              --arg tag "$TAG" \
              --arg ts "$TIMESTAMP" \
              --arg unified "$P4/$UNIFIED_NAME" \
              --arg sdcard "$P4/${DEV}-${TAG}-sd.zip" \
              --arg hash "$P4/${DEV}-${TAG}-sd-hash.txt" \
              --arg pico "$PICO_PATH" \
              '{tag: $tag, timestamp: $ts, files: {unified: $unified, sdcard: $sdcard, hash: $hash, pico: $pico}}')
          fi

          if [ -f "$MANIFEST" ]; then
            TMP=$(mktemp)
            jq --arg tag "$TAG" --argjson entry "$NEW_ENTRY" \
              '.latest = $tag | .versions = ([$entry] + [.versions[] | select(.tag != $tag)])' \
              "$MANIFEST" > "$TMP" && mv "$TMP" "$MANIFEST"
          else
            jq -n --arg ch "$CHANNEL" --arg tag "$TAG" --argjson entry "$NEW_ENTRY" \
              '{channel: $ch, latest: $tag, versions: [$entry]}' > "$MANIFEST"
          fi

          # ── Clean up legacy files ──
          rm -f "$CHANNEL/latest.json"
          rm -f "$P4/dada-tbd.bin" "$P4/bootloader.bin" "$P4/partition-table.bin"
          rm -f "$P4/ota_data_initial.bin" "$P4/tusb_msc.bin"
          rm -f "$P4/${DEV}-app.bin" "$P4/${DEV}-bootloader.bin"
          rm -f "$P4/${DEV}-partitions.bin" "$P4/${DEV}-otadata.bin"
          rm -f "$P4/${DEV}-tusb-msc.bin"
          rm -f "$P4/${DEV}-sd.zip" "$P4/${DEV}-sd-hash.txt"
          rm -f "$P4/dada-tbd-sd.zip" "$P4/dada-tbd-sd-hash.txt"
          rm -f "$CHANNEL/pico/dada-tbd-pico.uf2"
          rm -f "$CHANNEL/pico/pico-version.txt"

          rm -rf incoming/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANNEL="${{ github.event.client_payload.channel }}"
          TAG="${{ github.event.client_payload.tag }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update $CHANNEL channel — $TAG"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: receive
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
